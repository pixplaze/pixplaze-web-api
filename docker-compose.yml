services:
  # Контейнер базы данных
  db:
    image: postgres:16
    container_name: pixplaze-db
    restart: always
    environment:
      POSTGRES_DB: ${PIXPLAZE_DB}
      POSTGRES_USER: ${PIXPLAZE_DB_USERNAME}
      POSTGRES_PASSWORD: ${PIXPLAZE_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PIXPLAZE_DB_USERNAME} -d ${PIXPLAZE_DB}"]
      interval: "5s"
      timeout: "5s"
      retries: 3
    ports:
      - "5432:5432"
    volumes:
      - pixplaze_db_data:/var/lib/postgresql/data
  # Контейнер API
  api:
    # Образ собирается отдельно (docker build) и переносится готовым (docker save/load) — см. README.
    # Здесь только запуск: ни локальная, ни удалённая машина не собирают образ из исходников.
    image: pixplaze-web-api:${PIXPLAZE_TAG:-latest}
    container_name: pixplaze-web-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # Настройки переменных среды для базы данных
      PIXPLAZE_DB_URL: jdbc:postgresql://db:5432/${PIXPLAZE_DB}
      PIXPLAZE_DB_USERNAME: ${PIXPLAZE_DB_USERNAME}
      PIXPLAZE_DB_PASSWORD: ${PIXPLAZE_DB_PASSWORD}
      # Настройки переменных среды gateway для API и веб-приложения
      PIXPLAZE_WEB_API_URL: ${PIXPLAZE_WEB_API_URL}
      PIXPLAZE_WEB_APP_URL: ${PIXPLAZE_WEB_APP_URL}
      # Настройки переменных среды с ES256-ключами для подписи токенов
      EC_PRIVATE_KEY: ${EC_PRIVATE_KEY}
      EC_PUBLIC_KEY: ${EC_PUBLIC_KEY}

volumes:
  pixplaze_db_data:
