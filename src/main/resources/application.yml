server:
  address: 0.0.0.0
  port: 8080
spring:
  datasource:
    url: ${PIXPLAZE_DB_URL}
    username: ${PIXPLAZE_DB_USERNAME}
    password: ${PIXPLAZE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    out-of-order: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  application:
    name: "pixplaze-web-api"
app:
  url.api.gateway: ${PIXPLAZE_WEB_API_URL}
  url.app.gateway: ${PIXPLAZE_WEB_APP_URL}
  security:
    auth:
      device:
        session:
          expiration.seconds: 300
          interval.seconds: 5
          # Срок жизни сессии после grant: одобрённая сессия гаснет в узком окне (bearer-QR обратного логина).
          grant-expiration.seconds: 15
      token:
        access:
          expiration-minutes: 2400
          kid: k1
          private-key: ${EC_PRIVATE_KEY}
          public-key: ${EC_PUBLIC_KEY}
        refresh:
          expiration.days: 30
    cors:
      allowed-origins:
        - "*"
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowed-headers:
        - "*"
      allow-credentials: true
